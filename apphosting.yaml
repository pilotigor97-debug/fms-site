# Firebase App Hosting config — site institucional FMS
# https://firebase.google.com/docs/app-hosting/configure
#
# Backend roda em Cloud Run gerenciado pelo Firebase. Cada push pro
# GitHub branch conectado dispara um build + deploy automático.

runConfig:
  # Cloud Run serverless. Sem instância sempre-on (custo zero quando
  # não tem tráfego). Sobe quando recebe requisição.
  minInstances: 0
  maxInstances: 10
  cpu: 1
  memoryMiB: 512
  concurrency: 80

env:
  # ─── Públicas (vão pro client bundle Next.js) ────────────────
  - variable: NEXT_PUBLIC_ROOT_DOMAIN
    # URL pública do App Hosting. O middleware compara `host` com isto
    # pra distinguir "site institucional" de "subdomínio de tenant".
    # Quando comprar fms.com.br, atualiza aqui pra `fms.com.br`.
    value: fms-site--opspilot-dev.us-central1.hosted.app
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_APP_URL
    # URL do app Flutter pro handoff de login (legacy custom token,
    # ainda usado por apps nativos Android/iOS).
    value: https://opspilot-dev.web.app
    availability:
      - BUILD
      - RUNTIME

  # ─── Server-side (não vão pro bundle client) ─────────────────
  # O site compartilha o mesmo Firebase project do app OpsPilot SaaS
  # multi-tenant — opspilot-dev em dev, opspilot-prod em prod.
  - variable: FIREBASE_PROJECT_ID
    value: opspilot-dev
    availability:
      - RUNTIME

  - variable: FIREBASE_WEB_API_KEY
    # Web API Key do projeto opspilot-dev. Usado pelas rotas server-side
    # (/api/auth/login mantido como fallback pra apps nativos).
    value: AIzaSyA2f8TcsgffjbDylxcyO3OEprR0JY6-Gn8
    availability:
      - RUNTIME

  # ─── Firebase Web SDK (client bundle) ────────────────────────
  # Vão pro bundle public do Next.js. Não são segredos — qualquer app
  # web Firebase expõe estes valores. Permitem signup/login client-side
  # via Firebase JS SDK no mesmo origin do /app/ (Bloco C2 da migração).
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: AIzaSyA2f8TcsgffjbDylxcyO3OEprR0JY6-Gn8
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: opspilot-dev.firebaseapp.com
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: opspilot-dev
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: 1:30848564493:web:9c174736b30e753783c444
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: opspilot-dev.firebasestorage.app
    availability:
      - BUILD
      - RUNTIME

  - variable: SALES_LEAD_EMAIL
    value: atendimento.solucleanrj@gmail.com
    availability:
      - RUNTIME

  # ─── Secrets (gerenciados via Google Secret Manager) ─────────
  # Versões 2 e 3 (criadas erroneamente nesta sessão com creds de
  # relatorio-tecnico-dev) foram revertidas — vide
  # `gcloud secrets versions list` no opspilot-dev.
  #
  # Setar via CLI (no projeto opspilot-dev):
  #   firebase apphosting:secrets:set FIREBASE_CLIENT_EMAIL
  #   firebase apphosting:secrets:set FIREBASE_PRIVATE_KEY
  - variable: FIREBASE_CLIENT_EMAIL
    secret: FIREBASE_CLIENT_EMAIL
    availability:
      - RUNTIME

  - variable: FIREBASE_PRIVATE_KEY
    secret: FIREBASE_PRIVATE_KEY
    availability:
      - RUNTIME
