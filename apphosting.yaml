# Firebase App Hosting config — site institucional FMS
# https://firebase.google.com/docs/app-hosting/configure
#
# Backend roda em Cloud Run gerenciado pelo Firebase. Cada push pro
# GitHub branch conectado dispara um build + deploy automático.

runConfig:
  # Cloud Run serverless. Sem instância sempre-on (custo zero quando
  # não tem tráfego). Sobe quando recebe requisição.
  minInstances: 0
  maxInstances: 10
  cpu: 1
  memoryMiB: 512
  concurrency: 80

env:
  # ─── Públicas (vão pro client bundle Next.js) ────────────────
  - variable: NEXT_PUBLIC_ROOT_DOMAIN
    # URL pública do App Hosting. O middleware compara `host` com isto
    # pra distinguir "site institucional" de "subdomínio de tenant".
    # Quando comprar fms.com.br, atualiza aqui pra `fms.com.br`.
    value: fms-site--opspilot-dev.us-central1.hosted.app
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_APP_URL
    # URL do app Flutter pro handoff de login.
    # Migrado para relatorio-tecnico-dev em 2026-04-28 (auth unificada
    # com o projeto Firebase do app Flutter — vide .env.local.backup-opspilot-dev
    # para o estado anterior).
    value: https://relatorio-tecnico-dev.web.app
    availability:
      - BUILD
      - RUNTIME

  # ─── Server-side (não vão pro bundle client) ─────────────────
  # NOTA: o site agora compartilha o mesmo Firebase project do app Flutter
  # para que custom tokens / users / companies fiquem em um lugar só.
  # Antes: opspilot-dev. Agora: relatorio-tecnico-dev (dev) ou
  # relatorio-tecnico-4ae8c (prod, quando promover este apphosting.yaml).
  - variable: FIREBASE_PROJECT_ID
    value: relatorio-tecnico-dev
    availability:
      - RUNTIME

  - variable: FIREBASE_WEB_API_KEY
    # Web API Key do projeto relatorio-tecnico-dev. Veio de
    # lib/firebase_options_dev.dart no repo do app Flutter.
    # Server-side ainda usado pela rota /api/auth/handoff (custom token
    # para apps nativos Android/iOS). Auth do site web usa Firebase JS SDK.
    value: AIzaSyAql8EMHb7RKWbDBtuk2SiHySeUeeHQGOM
    availability:
      - RUNTIME

  # ─── Firebase Web SDK (client bundle) ────────────────────────
  # Vão pro bundle public do Next.js. Não são segredos — qualquer app
  # web Firebase expõe estes valores. Permitem ao site fazer login,
  # signup, e leitura via Firestore Rules direto do client.
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: AIzaSyAql8EMHb7RKWbDBtuk2SiHySeUeeHQGOM
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: relatorio-tecnico-dev.firebaseapp.com
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: relatorio-tecnico-dev
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: 1:539265514207:web:2086faaed4a3614ee0876a
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: relatorio-tecnico-dev.firebasestorage.app
    availability:
      - BUILD
      - RUNTIME

  - variable: SALES_LEAD_EMAIL
    value: atendimento.solucleanrj@gmail.com
    availability:
      - RUNTIME

  # ─── Secrets (gerenciados via Google Secret Manager) ─────────
  # ⚠ Após migração 2026-04-28 (opspilot-dev → relatorio-tecnico-dev), os
  # secrets precisam ser RE-SETADOS porque secrets são por projeto:
  #
  #   firebase use relatorio-tecnico-dev
  #   firebase apphosting:secrets:set FIREBASE_CLIENT_EMAIL
  #   firebase apphosting:secrets:set FIREBASE_PRIVATE_KEY
  #
  # Os valores estão em scripts/serviceAccountKeyDev.json (no repo do
  # app Flutter, fora do git).
  - variable: FIREBASE_CLIENT_EMAIL
    secret: FIREBASE_CLIENT_EMAIL
    availability:
      - RUNTIME

  - variable: FIREBASE_PRIVATE_KEY
    secret: FIREBASE_PRIVATE_KEY
    availability:
      - RUNTIME
